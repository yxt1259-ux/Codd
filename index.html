<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云南省实时天气地图系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <script>
        // 动态加载高德地图API
        const script = document.createElement('script');
        script.src = `https://webapi.amap.com/maps?v=2.0&key=${config.amapApiKey}`;
        document.head.appendChild(script);
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-left h1 {
            color: #1e40af;
            font-size: 24px;
            font-weight: bold;
        }
        
        .header-right {
            color: #6b7280;
            font-size: 16px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 20px;
        }
        
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .chart-card h3 {
            color: #1e40af;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .chart-container {
            height: 200px;
            position: relative;
        }
        
        .map-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        #map {
            height: 600px;
            width: 100%;
        }
        
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .card-title {
            font-size: 18px;
            color: #1e40af;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .city-info {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .city-name {
            font-size: 20px;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 5px;
        }
        
        .temp-range {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 10px;
        }
        
        .current-temp {
            font-size: 48px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .weather-icon {
            font-size: 40px;
        }
        
        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: #eff6ff;
            border-radius: 10px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-size: 16px;
            font-weight: bold;
            color: #1e40af;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            flex: 1;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        
        .popup-content {
            font-size: 14px;
            line-height: 1.6;
        }
        
        .city-popup {
            max-width: 200px;
        }
        
        .suggestion-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: none;
        }
        
        .suggestion-box.show {
            display: block;
        }
        
        .filter-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .filter-section {
            margin-bottom: 15px;
        }
        
        .filter-section h4 {
            color: #1e40af;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .filter-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            font-size: 13px;
        }
        
        .filter-option input[type="checkbox"] {
            accent-color: #3b82f6;
        }
        
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
            
            .left-panel {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .chart-card {
                flex: 1;
                min-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <span>🌤️</span>
                <h1>云南省实时天气地图系统 V1.0</h1>
            </div>
            <div class="header-right">
                2026年3月8日
            </div>
        </div>
        
        <div class="main-content">
            <div class="left-panel">
                <div class="chart-card">
                    <h3>逐月气温趋势图</h3>
                    <div class="chart-container">
                        <canvas id="tempChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>湿度折线图</h3>
                    <div class="chart-container">
                        <canvas id="humidityChart"></canvas>
                    </div>
                </div>
                <div class="filter-panel">
                    <div class="filter-section">
                        <h4>全部</h4>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>昆明</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>曲靖</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>丽江</span>
                        </div>
                    </div>
                    <div class="filter-section">
                        <h4>温度</h4>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>温度湿度</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>湿度温度</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" checked>
                            <span>发布地图</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="map-container">
                <div id="map"></div>
                <div id="amap" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
            </div>
            
            <div class="right-panel">
                <div class="card" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                        <div>
                            <div style="font-size: 20px; font-weight: bold; margin-bottom: 5px;">昆明 (Kunming)</div>
                            <div style="font-size: 14px; opacity: 0.9; margin-bottom: 10px;">12℃ ~ 27℃</div>
                            <div style="font-size: 48px; font-weight: bold; display: flex; align-items: center; gap: 15px;">
                                <span>22℃</span>
                                <span style="font-size: 40px;">☀️</span>
                            </div>
                        </div>
                        <div style="background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 8px;">
                            <div style="font-size: 12px; opacity: 0.9;">城市</div>
                            <div style="font-size: 14px; font-weight: bold;">昆明市</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                        <div style="background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center;">
                            <div style="font-size: 12px; opacity: 0.9; margin-bottom: 5px;">湿度</div>
                            <div style="font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                                <span>💧</span>
                                <span id="humidity">70%</span>
                            </div>
                        </div>
                        <div style="background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center;">
                            <div style="font-size: 12px; opacity: 0.9; margin-bottom: 5px;">风速</div>
                            <div style="font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                                <span>💨</span>
                                <span id="windSpeed">4级</span>
                            </div>
                        </div>
                        <div style="background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center;">
                            <div style="font-size: 12px; opacity: 0.9; margin-bottom: 5px;">气压</div>
                            <div style="font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                                <span>🌡️</span>
                                <span id="pressure">1004hPa</span>
                            </div>
                        </div>
                        <div style="background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; align-items: center;">
                            <div style="font-size: 12px; opacity: 0.9; margin-bottom: 5px;">体感温</div>
                            <div style="font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                                <span>👤</span>
                                <span id="feelsLike">17℃</span>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn" id="recommendBtn" style="background: rgba(255, 255, 255, 0.2); color: white; flex: 1;">
                            🎲 随机推荐
                        </button>
                        <button class="btn" id="routeBtn" style="background: rgba(255, 255, 255, 0.2); color: white; flex: 1;">
                            🗺️ 路线规划
                        </button>
                    </div>
                </div>
                
                <div class="card suggestion-box" id="suggestBox">
                    <h3 class="card-title">🎯 旅游推荐</h3>
                    <div id="suggestContent"></div>
                </div>
                
                <div class="card route-panel" id="routePanel">
                    <h3 class="card-title">🗺️ 路线规划</h3>
                    <div class="input-group">
                        <label>起始地</label>
                        <input type="text" id="origin" placeholder="请输入起始地">
                    </div>
                    <div class="input-group">
                        <label>目的地</label>
                        <input type="text" id="destination" placeholder="请输入目的地">
                    </div>
                    <button class="btn btn-primary" id="searchRoute" style="width: 100%;">
                        查询路线
                    </button>
                    <div class="route-options" id="routeOptions"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化Leaflet地图（用于显示云南省地理边界和天气信息）
        const leafletMap = L.map('map', {
            center: [25.0, 102.7],
            zoom: 7,
            minZoom: 6,
            maxZoom: 10,
            zoomControl: true,
            attributionControl: false
        });
        
        // 添加高德地图图层（暗色风格）
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}', {
            subdomains: ['1', '2', '3', '4']
        }).addTo(leafletMap);
        
        // 限制地图范围为云南省
        const yunnanBounds = L.latLngBounds(
            [21.0, 97.4], // 西南角
            [29.3, 106.2]  // 东北角
        );
        leafletMap.setMaxBounds(yunnanBounds);
        leafletMap.fitBounds(yunnanBounds);
        
        let weatherData = null;
        let geoData = null;
        let popups = [];
        let currentRoute = null;
        
        // 初始化图表
        function initCharts() {
            // 逐月气温趋势图
            const tempCtx = document.getElementById('tempChart').getContext('2d');
            new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    datasets: [{
                        label: '平均气温 (℃)',
                        data: [10, 12, 16, 20, 23, 25, 26, 25, 22, 18, 14, 11],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            min: 0,
                            max: 30
                        }
                    }
                }
            });
            
            // 湿度折线图
            const humidityCtx = document.getElementById('humidityChart').getContext('2d');
            new Chart(humidityCtx, {
                type: 'line',
                data: {
                    labels: ['12-24时', '0-6时', '6-12时', '12-18时', '18-24时'],
                    datasets: [{
                        label: '湿度 (%)',
                        data: [60, 75, 65, 55, 70],
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 页面加载完成后初始化图表
        window.onload = function() {
            initCharts();
        };
        
        // 景点数据
        const travelSpots = {
            "昆明市": "滇池、云南民族村、石林",
            "曲靖市": "罗平油菜花、九龙瀑布",
            "玉溪市": "抚仙湖、哀牢山",
            "保山市": "腾冲热海、和顺古镇",
            "昭通市": "大山包、黄连河",

            "楚雄彝族自治州": "元谋土林、彝人古镇",
            "红河哈尼族彝族自治州": "元阳梯田、建水古城",

            "大理白族自治州": "大理古城、洱海、苍山",
            "德宏傣族景颇族自治州": "瑞丽口岸、芒市金塔",

        // 生成未来几天的模拟天气数据
        function generateWeatherForecast(city, days = 7) {
            const forecast = [];
            const baseTemp = parseInt(weatherData[city].temp);
            const weatherTypes = ['晴', '多云', '阴', '小雨', '中雨'];
            
            for (let i = 0; i < days; i++) {
                const temp = baseTemp + Math.floor(Math.random() * 6) - 3;
                const weather = weatherTypes[Math.floor(Math.random() * weatherTypes.length)];
                const humidity = 40 + Math.floor(Math.random() * 30);
                
                forecast.push({
                    day: i === 0 ? '今天' : `${i+1}天后`,
                    temp: temp.toString(),
                    text: weather,
                    humidity: humidity.toString()
                });
            }
            
            return forecast;
        }

        // 根据温度获取颜色
        function getColorByTemperature(temp) {
            temp = parseInt(temp);
            if (temp < 15) return '#93c5fd';  // 蓝色 - 较冷
            if (temp < 20) return '#60a5fa';  // 浅蓝色
            if (temp < 25) return '#fcd34d';  // 黄色 - 温暖
            if (temp < 28) return '#f97316';  // 橙色 - 较热
            return '#ef4444';  // 红色 - 炎热
        }
        
        // 加载GeoJSON
        function loadGeo() {
            console.log("开始加载GeoJSON数据");
            // 添加随机参数避免浏览器缓存
            const randomParam = '?t=' + new Date().getTime();
            fetch('yunnan_geo.json' + randomParam)
                .then(res => {
                    console.log("GeoJSON请求响应:", res);
                    return res.json();
                })
                .then(data => {
                    console.log("GeoJSON数据加载成功:", data);
                    geoData = data;
                    
                    L.geoJSON(data, {
                        style: function(feature) {
                            const city = feature.properties.name;
                            const w = weatherData[city];
                            const color = w ? getColorByTemperature(w.temp) : '#1e40af';
                            return {
                                color: color,
                                weight: 2,
                                fillOpacity: 0.1,
                                fillColor: color
                            };
                        },
                        onEachFeature: function(feature, layer) {
                            layer.on({
                                mouseover: function(e) {
                                    const city = feature.properties.name;
                                    const w = weatherData[city];
                                    if (w) {
                                        layer.setStyle({
                                            weight: 3,
                                            color: '#1e40af',
                                            fillOpacity: 0.2
                                        });
                                        
                                        L.popup({
                                            className: 'city-popup'
                                        })
                                            .setLatLng(e.latlng)
                                            .setContent(`
                                                <div class="popup-content">
                                                    <h4 style="color: #1e40af; margin-bottom: 8px;">${city}</h4>
                                                    <div style="font-size: 24px; font-weight: bold; color: #1f2937;">${w.temp}°C</div>
                                                    <div style="color: #6b7280; margin: 5px 0;">${w.text}</div>
                                                    <div style="background: #fef3c7; padding: 5px 10px; border-radius: 5px; display: inline-block; margin: 5px 0;">
                                                        ${getClothes(w.temp).text}
                                                    </div>
                                                </div>
                                            `)
                                            .openOn(leafletMap);
                                    }
                                },
                                mouseout: function(e) {
                                    const city = feature.properties.name;
                                    const w = weatherData[city];
                                    const color = w ? getColorByTemperature(w.temp) : '#1e40af';
                                    layer.setStyle({
                                        weight: 2,
                                        color: color,
                                        fillOpacity: 0.1
                                    });
                                    leafletMap.closePopup();
                                },
                                click: async function(e) {
                                    const city = feature.properties.name;
                                    const w = weatherData[city];
                                    if (w) {
                                        await updateCurrentWeather(city, w);
                                    }
                                }
                            });
                        }
                    }).addTo(leafletMap);
                })
                .catch(err => {
                    console.error("GeoJSON加载失败:", err);
                    // 使用默认的GeoData，确保随机推荐功能正常工作
